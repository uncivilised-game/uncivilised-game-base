name: Conviction Implement

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub issue number to implement (leave empty for highest conviction)'
        required: false
        type: string
  issue_comment:
    types: [created]

jobs:
  implement:
    # Run on manual trigger OR /fix comment from an admin on any issue
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '/fix') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DIPLOMACY_REPO_TOKEN: ${{ secrets.DIPLOMACY_REPO_TOKEN }}

    steps:
      - name: React to comment
        if: github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket

      - name: Checkout base repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: devel

      - name: Checkout diplomacy repo
        run: |
          git clone --depth 1 \
            "https://x-access-token:${DIPLOMACY_REPO_TOKEN}@github.com/uncivilised-game/uncivilised-diplomacy.git" \
            ../uncivilised-diplomacy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup diplomacy CLI auth
        run: |
          printf '#!/bin/sh\nGH_TOKEN="$DIPLOMACY_REPO_TOKEN" gh "$@"\n' > /usr/local/bin/gh-diplomacy
          chmod +x /usr/local/bin/gh-diplomacy

      - name: Check auth method
        id: auth
        run: |
          if [ -n "$OAUTH_TOKEN" ]; then
            echo "method=oauth" >> "$GITHUB_OUTPUT"
          else
            echo "method=apikey" >> "$GITHUB_OUTPUT"
          fi
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Pick issue
        id: pick
        env:
          INPUT_ISSUE: ${{ inputs.issue_number }}
          COMMENT_ISSUE: ${{ github.event.issue.number }}
        run: |
          # From /fix comment — use the issue the comment was on
          if [ -n "$COMMENT_ISSUE" ] && [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "issue_number=$COMMENT_ISSUE" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT_ISSUE" ]; then
            echo "issue_number=$INPUT_ISSUE" >> "$GITHUB_OUTPUT"
          else
            ISSUE=$(gh issue list \
              --label conviction \
              --state open \
              --json number,body,title \
              --limit 50 \
              | python3 -c "
          import sys, json, re
          issues = json.load(sys.stdin)
          scored = []
          for i in issues:
              m = re.search(r'Conviction Score:\s*(\d+)', i.get('body',''))
              if m:
                  scored.append((int(m.group(1)), i['number'], i['title']))
          scored.sort(reverse=True)
          if scored:
              print(scored[0][1])
          else:
              print('')
          ")
            if [ -z "$ISSUE" ]; then
              echo "No conviction issues found"
              exit 1
            fi
            echo "issue_number=$ISSUE" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract instructions after /fix
        id: instructions
        if: github.event_name == 'issue_comment'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Extract everything after /fix (trim leading whitespace)
          EXTRA=$(echo "$COMMENT_BODY" | sed 's|.*/fix||' | sed 's/^[[:space:]]*//')
          {
            echo "text<<INSTRUCTIONS_EOF"
            echo "$EXTRA"
            echo "INSTRUCTIONS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get issue details
        id: issue
        run: |
          ISSUE_NUM="${{ steps.pick.outputs.issue_number }}"
          echo "Implementing issue #${ISSUE_NUM}"
          TITLE=$(gh issue view "$ISSUE_NUM" --json title --jq '.title' | tr -d '\n' | head -c 200)
          echo "number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          {
            echo "title<<TITLE_EOF"
            echo "$TITLE"
            echo "TITLE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Implement with Claude Code (OAuth)
        if: steps.auth.outputs.method == 'oauth'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are implementing a fix/feature for issue #${{ steps.issue.outputs.number }} in the Uncivilised game.

            ISSUE TITLE: ${{ steps.issue.outputs.title }}

            Read the full issue with: gh issue view ${{ steps.issue.outputs.number }}

            ADDITIONAL INSTRUCTIONS FROM THE /fix COMMENT:
            ${{ steps.instructions.outputs.text }}

            REPO LAYOUT:
            This project spans TWO repositories, both checked out and available:
            - Base game (current directory): uncivilised-game-base (open source)
            - Diplomacy plugin (at ../uncivilised-diplomacy): uncivilised-diplomacy (private)

            The diplomacy repo contains: AI diplomacy (diplomacy.js), game mods (game-mods.js),
            and AI faction logic (ai.js). The base game imports diplomacy functions via
            src/diplomacy-api.js which delegates to the plugin at build time.

            INSTRUCTIONS:
            1. Read the issue carefully — it contains player reports describing the problem/request
            2. Read CLAUDE.md for codebase context and conventions
            3. Determine which repo(s) the fix belongs in:
               - Base game bugs/features → changes in this repo
               - Diplomacy, AI behavior, game mods → changes in ../uncivilised-diplomacy
               - Some issues may need changes in both repos
            4. Read the relevant source files in whichever repo before making changes
            5. Implement the fix or feature
            6. Keep changes minimal and focused — fix exactly what the issue describes
            7. Test your changes if possible (npm run build at minimum)
            8. For changes in the BASE GAME repo (this directory):
               - Create a branch named "fix/${{ steps.issue.outputs.number }}"
               - Commit and push, then create a PR targeting "devel" branch
               - Include "Fixes #${{ steps.issue.outputs.number }}" in the PR body
            9. For changes in the DIPLOMACY repo (../uncivilised-diplomacy):
               - Use `git -C ../uncivilised-diplomacy` for all git commands (do NOT cd)
               - Create a branch: git -C ../uncivilised-diplomacy checkout -b fix/${{ steps.issue.outputs.number }}
               - Stage, commit, and push from the base directory using git -C
               - Create a PR using the diplomacy-authenticated CLI:
                 gh-diplomacy pr create --repo uncivilised-game/uncivilised-diplomacy --base main --title "..." --body "..."
               - Reference "uncivilised-game/uncivilised-game-base#${{ steps.issue.outputs.number }}" in the PR body
            10. After creating any diplomacy PR, comment on the original issue (#${{ steps.issue.outputs.number }})
                with a link to the diplomacy PR so admins can find it. Use:
                gh issue comment ${{ steps.issue.outputs.number }} --body "Diplomacy PR: <url>"
            11. Do NOT push to main/devel directly in either repo

            IMPORTANT:
            - This is a browser-based 4X strategy game
            - Frontend is ES modules bundled by esbuild into game.js
            - Backend is Python FastAPI (api/index.py for production, server.py for local)
            - If modifying diplomacy-api.js (the plugin interface in the base repo), ensure the
              corresponding implementation exists in the diplomacy repo's src/plugin.js
            - Read the relevant source files before making any changes

          claude_args: '--allowed-tools "Bash(git:*),Bash(gh:*),Bash(gh-diplomacy:*),Bash(npm:*),Bash(node:*),Bash(python3:*),Bash(ls:*),Read,Write,Edit,Glob,Grep"'

      - name: Implement with Claude Code (API key)
        if: steps.auth.outputs.method == 'apikey'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are implementing a fix/feature for issue #${{ steps.issue.outputs.number }} in the Uncivilised game.

            ISSUE TITLE: ${{ steps.issue.outputs.title }}

            Read the full issue with: gh issue view ${{ steps.issue.outputs.number }}

            ADDITIONAL INSTRUCTIONS FROM THE /fix COMMENT:
            ${{ steps.instructions.outputs.text }}

            REPO LAYOUT:
            This project spans TWO repositories, both checked out and available:
            - Base game (current directory): uncivilised-game-base (open source)
            - Diplomacy plugin (at ../uncivilised-diplomacy): uncivilised-diplomacy (private)

            The diplomacy repo contains: AI diplomacy (diplomacy.js), game mods (game-mods.js),
            and AI faction logic (ai.js). The base game imports diplomacy functions via
            src/diplomacy-api.js which delegates to the plugin at build time.

            INSTRUCTIONS:
            1. Read the issue carefully — it contains player reports describing the problem/request
            2. Read CLAUDE.md for codebase context and conventions
            3. Determine which repo(s) the fix belongs in:
               - Base game bugs/features → changes in this repo
               - Diplomacy, AI behavior, game mods → changes in ../uncivilised-diplomacy
               - Some issues may need changes in both repos
            4. Read the relevant source files in whichever repo before making changes
            5. Implement the fix or feature
            6. Keep changes minimal and focused — fix exactly what the issue describes
            7. Test your changes if possible (npm run build at minimum)
            8. For changes in the BASE GAME repo (this directory):
               - Create a branch named "fix/${{ steps.issue.outputs.number }}"
               - Commit and push, then create a PR targeting "devel" branch
               - Include "Fixes #${{ steps.issue.outputs.number }}" in the PR body
            9. For changes in the DIPLOMACY repo (../uncivilised-diplomacy):
               - Use `git -C ../uncivilised-diplomacy` for all git commands (do NOT cd)
               - Create a branch: git -C ../uncivilised-diplomacy checkout -b fix/${{ steps.issue.outputs.number }}
               - Stage, commit, and push from the base directory using git -C
               - Create a PR using the diplomacy-authenticated CLI:
                 gh-diplomacy pr create --repo uncivilised-game/uncivilised-diplomacy --base main --title "..." --body "..."
               - Reference "uncivilised-game/uncivilised-game-base#${{ steps.issue.outputs.number }}" in the PR body
            10. After creating any diplomacy PR, comment on the original issue (#${{ steps.issue.outputs.number }})
                with a link to the diplomacy PR so admins can find it. Use:
                gh issue comment ${{ steps.issue.outputs.number }} --body "Diplomacy PR: <url>"
            11. Do NOT push to main/devel directly in either repo

            IMPORTANT:
            - This is a browser-based 4X strategy game
            - Frontend is ES modules bundled by esbuild into game.js
            - Backend is Python FastAPI (api/index.py for production, server.py for local)
            - If modifying diplomacy-api.js (the plugin interface in the base repo), ensure the
              corresponding implementation exists in the diplomacy repo's src/plugin.js
            - Read the relevant source files before making any changes

          claude_args: '--allowed-tools "Bash(git:*),Bash(gh:*),Bash(gh-diplomacy:*),Bash(npm:*),Bash(node:*),Bash(python3:*),Bash(ls:*),Read,Write,Edit,Glob,Grep"'
