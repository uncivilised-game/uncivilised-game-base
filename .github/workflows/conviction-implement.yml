name: Conviction Implement

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub issue number to implement (leave empty for highest conviction)'
        required: false
        type: string
  issue_comment:
    types: [created]

jobs:
  implement:
    # Run on manual trigger OR /fix comment on a conviction-labeled issue
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '/fix') &&
       contains(toJSON(github.event.issue.labels.*.name), 'conviction') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: React to comment
        if: github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: devel

      - name: Check auth method
        id: auth
        run: |
          if [ -n "$OAUTH_TOKEN" ]; then
            echo "method=oauth" >> "$GITHUB_OUTPUT"
          else
            echo "method=apikey" >> "$GITHUB_OUTPUT"
          fi
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Pick issue
        id: pick
        env:
          INPUT_ISSUE: ${{ inputs.issue_number }}
          COMMENT_ISSUE: ${{ github.event.issue.number }}
        run: |
          # From /fix comment — use the issue the comment was on
          if [ -n "$COMMENT_ISSUE" ] && [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "issue_number=$COMMENT_ISSUE" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT_ISSUE" ]; then
            echo "issue_number=$INPUT_ISSUE" >> "$GITHUB_OUTPUT"
          else
            ISSUE=$(gh issue list \
              --label conviction \
              --state open \
              --json number,body,title \
              --limit 50 \
              | python3 -c "
          import sys, json, re
          issues = json.load(sys.stdin)
          scored = []
          for i in issues:
              m = re.search(r'Conviction Score:\s*(\d+)', i.get('body',''))
              if m:
                  scored.append((int(m.group(1)), i['number'], i['title']))
          scored.sort(reverse=True)
          if scored:
              print(scored[0][1])
          else:
              print('')
          ")
            if [ -z "$ISSUE" ]; then
              echo "No conviction issues found"
              exit 1
            fi
            echo "issue_number=$ISSUE" >> "$GITHUB_OUTPUT"
          fi

      - name: Get issue details
        id: issue
        run: |
          ISSUE_NUM="${{ steps.pick.outputs.issue_number }}"
          echo "Implementing issue #${ISSUE_NUM}"
          TITLE=$(gh issue view "$ISSUE_NUM" --json title --jq '.title' | tr -d '\n' | head -c 200)
          echo "number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          {
            echo "title<<TITLE_EOF"
            echo "$TITLE"
            echo "TITLE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Implement with Claude Code (OAuth)
        if: steps.auth.outputs.method == 'oauth'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are implementing a fix/feature for issue #${{ steps.issue.outputs.number }} in the Uncivilised game.

            ISSUE TITLE: ${{ steps.issue.outputs.title }}

            Read the full issue with: gh issue view ${{ steps.issue.outputs.number }}

            INSTRUCTIONS:
            1. Read the issue carefully — it contains player reports describing the problem/request
            2. Read CLAUDE.md for codebase context and conventions
            3. Find the relevant code and understand it before making changes
            4. Implement the fix or feature
            5. Keep changes minimal and focused — fix exactly what the issue describes
            6. Test your changes if possible (npm run build at minimum)
            7. Create a branch named "fix/${{ steps.issue.outputs.number }}" and commit your changes
            8. Push the branch and create a PR targeting the "devel" branch with:
               - Title referencing the issue
               - Description explaining what you changed and why
               - "Fixes #${{ steps.issue.outputs.number }}" in the body to auto-close the issue
            9. Do NOT push to main directly

            IMPORTANT:
            - This is a browser-based 4X strategy game
            - Frontend is ES modules bundled by esbuild into game.js
            - Backend is Python FastAPI (api/index.py for production, server.py for local)
            - The diplomacy plugin lives in a separate repo — don't touch diplomacy-api.js stubs
            - Read the relevant source files before making any changes

          claude_args: '--allowed-tools "Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(node:*),Bash(python3:*),Bash(ls:*),Read,Write,Edit,Glob,Grep"'

      - name: Implement with Claude Code (API key)
        if: steps.auth.outputs.method == 'apikey'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are implementing a fix/feature for issue #${{ steps.issue.outputs.number }} in the Uncivilised game.

            ISSUE TITLE: ${{ steps.issue.outputs.title }}

            Read the full issue with: gh issue view ${{ steps.issue.outputs.number }}

            INSTRUCTIONS:
            1. Read the issue carefully — it contains player reports describing the problem/request
            2. Read CLAUDE.md for codebase context and conventions
            3. Find the relevant code and understand it before making changes
            4. Implement the fix or feature
            5. Keep changes minimal and focused — fix exactly what the issue describes
            6. Test your changes if possible (npm run build at minimum)
            7. Create a branch named "fix/${{ steps.issue.outputs.number }}" and commit your changes
            8. Push the branch and create a PR targeting the "devel" branch with:
               - Title referencing the issue
               - Description explaining what you changed and why
               - "Fixes #${{ steps.issue.outputs.number }}" in the body to auto-close the issue
            9. Do NOT push to main directly

            IMPORTANT:
            - This is a browser-based 4X strategy game
            - Frontend is ES modules bundled by esbuild into game.js
            - Backend is Python FastAPI (api/index.py for production, server.py for local)
            - The diplomacy plugin lives in a separate repo — don't touch diplomacy-api.js stubs
            - Read the relevant source files before making any changes

          claude_args: '--allowed-tools "Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(node:*),Bash(python3:*),Bash(ls:*),Read,Write,Edit,Glob,Grep"'
