name: PR Preview Deploy

on:
  issue_comment:
    types: [created]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/deploy') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: React to comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket

      - name: Get PR branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          echo "ref=$(echo "$PR_JSON" | jq -r .head.ref)" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo "$PR_JSON" | jq -r .head.sha)" >> "$GITHUB_OUTPUT"

      - name: Checkout base repo
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}
          path: uncivilised-game-base

      - name: Checkout diplomacy repo
        uses: actions/checkout@v4
        with:
          repository: uncivilised-game/uncivilised-diplomacy
          token: ${{ secrets.DIPLOMACY_REPO_TOKEN }}
          path: uncivilised-diplomacy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: uncivilised-game-base/package-lock.json

      - name: Install dependencies
        working-directory: uncivilised-game-base
        run: npm ci

      - name: Build (with diplomacy plugin)
        working-directory: uncivilised-game-base
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel project settings
        working-directory: uncivilised-game-base
        run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        working-directory: uncivilised-game-base
        run: |
          DEPLOY_URL=$(vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment with preview URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Preview deployed: ${{ steps.deploy.outputs.url }}

          Commit: \`${{ steps.pr.outputs.sha }}\`"
