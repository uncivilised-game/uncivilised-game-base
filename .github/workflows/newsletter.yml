name: Newsletter

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Custom message body for the newsletter'
        required: true
      subject:
        description: 'Email subject line'
        required: false
        default: 'News from Uncivilized'
      dry_run:
        description: 'Preview who would receive emails without sending (true/false)'
        required: false
        default: 'false'

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send newsletter
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          CUSTOM_MESSAGE: ${{ github.event.inputs.message }}
          EMAIL_SUBJECT: ${{ github.event.inputs.subject }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python scripts/newsletter.py
