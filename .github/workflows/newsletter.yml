name: Newsletter

on:
  workflow_dispatch:
    inputs:
      template:
        description: 'Template: "newsletter" (reusable), "launch" (open-source announcement), or "waitlist-approved" (promote waitlisted players)'
        required: false
        default: 'newsletter'
      message:
        description: 'Custom message body (required for newsletter template, ignored for launch)'
        required: false
      subject:
        description: 'Email subject line'
        required: false
        default: 'News from Uncivilized'
      dry_run:
        description: 'Preview who would receive emails without sending (true/false)'
        required: false
        default: 'false'
      test_email:
        description: 'Send preview to this single address instead of all players'
        required: false
        default: ''
      include_unverified:
        description: 'Also send to players with unverified emails (true/false)'
        required: false
        default: 'false'
      only_unverified:
        description: 'Send ONLY to unverified emails — use to catch up after a verified-only send (true/false)'
        required: false
        default: 'false'

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send newsletter
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          TEMPLATE: ${{ github.event.inputs.template }}
          CUSTOM_MESSAGE: ${{ github.event.inputs.message }}
          EMAIL_SUBJECT: ${{ github.event.inputs.subject }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          TEST_EMAIL: ${{ github.event.inputs.test_email }}
          INCLUDE_UNVERIFIED: ${{ github.event.inputs.include_unverified }}
          ONLY_UNVERIFIED: ${{ github.event.inputs.only_unverified }}
        run: python scripts/newsletter.py
